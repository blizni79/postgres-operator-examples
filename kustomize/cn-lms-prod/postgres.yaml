apiVersion: postgres-operator.crunchydata.com/v1
kind: PostgresCluster
metadata:
  name: cn-lms-prod
spec:
  postgresVersion: 18
  postGISVersion: "3.6"
  instances:
    - name: instance1
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 4Gi
      dataVolumeClaimSpec:
        accessModes:
        - "ReadWriteOnce"
        resources:
          requests:
            storage: 10Gi
  users:
    - name: cn-lms-prod
      databases:
        - cn-lms-prod
      options: 'SUPERUSER'
  service:
    metadata:
      annotations:
        metallb.io/address-pool: general-pool
        my-annotation: value1
      labels:
        my-label: value2
    type: LoadBalancer
    externalTrafficPolicy: Local
    nodePort: 31001
  patroni:
    dynamicConfiguration:
      postgresql:
        parameters:
          synchronous_commit: "off"
          max_connections: "200"
          shared_buffers: "256MB"
          tcp_keepalives_idle: 60
          tcp_keepalives_interval: 10
          tcp_keepalives_count: 5
        pg_hba:
          - host cn-lms-prod cn-lms-prod 10.244.7.0/24 trust
          - host all all 0.0.0.0/0 md5
  backups:
    pgbackrest:
      repos:
      - name: repo1
        schedules:
            full: "0 1 * * 0"
            differential: "0 1 * * 1-6"
        volume:
          volumeClaimSpec:
            accessModes:
            - "ReadWriteOnce"
            resources:
              requests:
                storage: 20Gi
