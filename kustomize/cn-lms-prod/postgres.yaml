apiVersion: postgres-operator.crunchydata.com/v1
kind: PostgresCluster
metadata:
  name: cn-lms-prod
spec:
  postgresVersion: 18
  postGISVersion: "3.6"
  instances:
    - name: instance1
      dataVolumeClaimSpec:
        accessModes:
        - "ReadWriteOnce"
        resources:
          requests:
            storage: 10Gi
  users:
    - name: cn-lms-prod
      databases:
        - cn-lms-prod
      options: 'SUPERUSER'
  service:
    metadata:
      annotations:
        my-annotation: value1
      labels:
        my-label: value2
    type: LoadBalancer
    nodePort: 31001
  monitoring:
    pgmonitor:
      exporter:
        image: registry.developers.crunchydata.com/crunchydata/crunchy-postgres-exporter:ubi9-0.18.1-2550
  patroni:
    dynamicConfiguration:
      postgresql:
        pg_hba:
          - host all ccp_monitoring 127.0.0.0/8 scram-sha-256
          - host all ccp_monitoring ::1/128 scram-sha-256
          - host all ccp_monitoring all reject
          - host cn-lms-prod cn-lms-prod 10.244.7.0/24 trust
          - host all all 0.0.0.0/0 md5
  backups:
    pgbackrest:
      repos:
      - name: repo1
        volume:
          volumeClaimSpec:
            accessModes:
            - "ReadWriteOnce"
            resources:
              requests:
                storage: 20Gi
