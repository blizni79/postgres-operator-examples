apiVersion: postgres-operator.crunchydata.com/v1
kind: PostgresCluster
metadata:
  name: cn-lms-prod
  namespace: postgres-operator
spec:
  postgresVersion: 18
  postGISVersion: "3.6"

  instances:
    - name: instance1
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 4Gi

      # Dane PG - local-path (block I/O, brak problemów NFS)
      dataVolumeClaimSpec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi

      # WAL na osobnym PVC - izolacja I/O, łatwiejszy recovery
      walVolumeClaimSpec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi

  users:
    - name: cn-lms-prod
      databases: [cn-lms-prod]
      options: "NOSUPERUSER NOCREATEROLE NOCREATEDB"
      password:
        type: AlphaNumeric

  service:
    metadata:
      annotations:
        metallb.io/address-pool: general-pool
      labels:
        my-label: cn-lms-prod
    type: LoadBalancer
    externalTrafficPolicy: Local
    nodePort: 31001

  patroni:
    dynamicConfiguration:
      postgresql:
        parameters:
          # Memory - shared_buffers = ~25% RAM (limit 4Gi)
          shared_buffers: "1GB"
          effective_cache_size: "3GB"
          work_mem: "16MB"
          maintenance_work_mem: "256MB"
          # WAL
          wal_buffers: "64MB"
          checkpoint_completion_target: "0.9"
          # Connections
          max_connections: "200"
          # Keepalives
          tcp_keepalives_idle: 60
          tcp_keepalives_interval: 10
          tcp_keepalives_count: 5
          # Logging
          log_min_duration_statement: "1000"
          synchronous_commit: "off"
        pg_hba:
          - "host cn-lms-prod cn-lms-prod 10.244.0.0/16 scram-sha-256"
          - "host all all 0.0.0.0/0 md5"

  backups:
    pgbackrest:
      global:
        repo1-retention-full: "4"
        repo1-retention-full-type: count
        repo1-retention-diff: "14"
      repos:
        - name: repo1
          schedules:
            full: "0 1 * * 0"
            differential: "0 1 * * 1-6"
            incremental: "0 */6 * * *"
          volume:
            volumeClaimSpec:
              accessModes: ["ReadWriteOnce"]
              storageClassName: local-path
              resources:
                requests:
                  storage: 30Gi
